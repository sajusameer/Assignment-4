<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- Tailwind + daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body>
     <header class="w-[70%] mx-auto mt-10">
        <h1 class="text-3xl font-bold mb-4">Job Application Tracker</h1>
        <!-- dashboard -->
        <div class="grid grid-cols-3 gap-8">
            <div class="card shadow p-4">
                <p>Total</p>
                <p id="total">0</p>
            </div>

            <div class="card shadow p-4">
                <p>Interview</p>
                <p id="interviewCount">0</p>
            </div>

            <div class="card shadow p-4">
                <p>Rejected</p>
                <p id="RejectedCount">0</p>
            </div>
        </div>
    </header>

     <hr class="w-[70%] my-5 mx-auto border-gray-300">

     <main class="w-[70%] mx-auto">
        <div class="mb-6 mr-4">
            <button onclick="toggleStyle('all-filter-btn')"  class="bg-blue-900 text-white px-8 py-2 shadow mr-4 rounded-sm" id="all-filter-btn">All</button>
            <button onclick="toggleStyle('thriving-filter-btn')"  class="bg-white mr-4 px-5 py-2 shadow text-gray-600 rounded-sm" id="thriving-filter-btn">Thriving</button>
            <button onclick="toggleStyle('struggling-filter-btn')"  class="bg-white px-5 py-2 shadow text-gray-600 rounded-sm" id="struggling-filter-btn">Struggling</button>
        </div>
     </main>





    
<script src="script.js"></script>
</body>
</html>
